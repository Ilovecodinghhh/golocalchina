version: "3.9"
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ctrip
      POSTGRES_PASSWORD: ctrip_secret
      POSTGRES_DB: ctripguides
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ctrip:ctrip_secret@db:5432/ctripguides
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-change-in-production
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
